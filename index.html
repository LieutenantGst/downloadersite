<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cobalt Downloader</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #6b46c1, #e53e3e);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .container {
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      max-width: 540px;
      width: 90%;
      text-align: center;
    }
    h1 { margin: 0 0 8px 0; color: #4c51bf; font-size: 28px; }
    .subtitle { color: #666; margin-bottom: 25px; }
    input {
      width: 100%;
      padding: 16px;
      font-size: 17px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 20px;
      box-sizing: border-box;
    }
    button {
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result {
      margin-top: 25px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 12px;
      display: none;
      text-align: left;
    }
    .download-btn {
      background: #10b981;
      color: white;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
      margin-top: 15px;
      font-weight: bold;
    }
    .platforms {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0;
    }
    .platform { background: #f1f5f9; padding: 6px 14px; border-radius: 30px; font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 Cobalt Downloader</h1>
    <p class="subtitle">YouTube • TikTok • Instagram • Facebook • X/Twitter • and more</p>
    
    <div class="platforms">
      <div class="platform">YouTube</div>
      <div class="platform">TikTok</div>
      <div class="platform">Instagram</div>
      <div class="platform">Facebook</div>
      <div class="platform">Twitter / X</div>
    </div>

    <input type="text" id="urlInput" placeholder="Paste any video link here (YouTube, TikTok, etc.)" />
    <button id="downloadBtn" onclick="startDownload()">Download with Cobalt</button>

    <div class="result" id="result">
      <p id="status">Processing...</p>
      <a id="directLink" href="#" target="_blank" class="download-btn" style="display:none;">⬇️ Click to Download</a>
    </div>

    <p style="font-size: 13px; color: #777; margin-top: 30px;">
      Powered by <a href="https://cobalt.tools" target="_blank" style="color:#667eea;">cobalt.tools</a><br>
      If the button doesn't start the download, open cobalt.tools manually and paste the link there.
    </p>
  </div>

  <script>
    async function startDownload() {
      const inputUrl = document.getElementById('urlInput').value.trim();
      const btn = document.getElementById('downloadBtn');
      const resultDiv = document.getElementById('result');
      const status = document.getElementById('status');
      const directLink = document.getElementById('directLink');

      if (!inputUrl) {
        status.innerHTML = "❌ Please paste a valid link!";
        resultDiv.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Processing...";
      status.innerHTML = "⏳ Connecting to Cobalt...";
      resultDiv.style.display = "block";
      directLink.style.display = "none";

      try {
        // Try Cobalt API (note: public instance often requires going through their site now)
        const response = await fetch('https://api.cobalt.tools/api/json', {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            url: inputUrl,
            isAudioOnly: false,
            filenameStyle: "pretty"
          })
        });

        const data = await response.json();

        if (data.status === "stream" || data.status === "redirect" || data.url) {
          const downloadUrl = data.url || data.redirectUrl;
          directLink.href = downloadUrl;
          directLink.style.display = "inline-block";
          status.innerHTML = `✅ Success! Click the button below to download.<br><small>High quality where available</small>`;
          
          // Auto-open download
          setTimeout(() => {
            window.open(downloadUrl, '_blank');
          }, 600);

        } else if (data.status === "error" || data.text) {
          status.innerHTML = `⚠️ Cobalt said: ${data.text || 'Unknown error'}`;
        } else {
          throw new Error("Unexpected response");
        }
      } catch (err) {
        console.error(err);
        status.innerHTML = `
          ❌ Could not get direct download from API.<br><br>
          <strong>Quick fix:</strong><br>
          1. Go to <a href="https://cobalt.tools" target="_blank">cobalt.tools</a><br>
          2. Paste your link there and download directly.<br><br>
          This is common — Cobalt sometimes blocks direct API calls to prevent abuse.
        `;
      }

      btn.disabled = false;
      btn.textContent = "Download with Cobalt";
    }

    // Enter key support
    document.getElementById('urlInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') startDownload();
    });
  </script>
</body>
</html>
